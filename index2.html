<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 출석 체크 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .status-badge { transition: all 0.2s; }
        .record-card { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="max-w-md mx-auto px-4 py-8">
        <!-- 헤더 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">출석부</h1>
            <p class="text-slate-500 mt-2" id="current-date"></p>
        </header>

        <!-- 입력 섹션 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-slate-100">
            <div class="mb-4">
                <label for="studentName" class="block text-sm font-medium text-slate-700 mb-1">학생 이름</label>
                <input type="text" id="studentName" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    placeholder="이름을 입력하세요">
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <button onclick="submitAttendance('출석')" class="flex flex-col items-center justify-center py-3 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-xl border border-emerald-200 transition">
                    <span class="text-lg font-bold">출석</span>
                </button>
                <button onclick="submitAttendance('결석')" class="flex flex-col items-center justify-center py-3 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded-xl border border-rose-200 transition">
                    <span class="text-lg font-bold">결석</span>
                </button>
                <button onclick="submitAttendance('지각')" class="flex flex-col items-center justify-center py-3 bg-amber-50 hover:bg-amber-100 text-amber-700 rounded-xl border border-amber-200 transition">
                    <span class="text-lg font-bold">지각</span>
                </button>
            </div>
        </div>

        <!-- 실시간 기록 섹션 -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-lg font-bold text-slate-800">최근 기록</h2>
                <span id="recordCount" class="text-sm text-slate-500">0건</span>
            </div>
            
            <div id="attendanceList" class="space-y-3">
                <!-- 데이터가 로드되면 여기에 표시됩니다 -->
                <div class="text-center py-10 text-slate-400">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 여기에 Firebase 프로젝트의 Config를 붙여넣으세요.
        const firebaseConfig = {
          apiKey: "AIzaSyAFjZA8JGmfaPLolPcTmHcbUtQ9T5tz4RM",
  authDomain: "test-attendance-7ca52.firebaseapp.com",
  projectId: "test-attendance-7ca52",
  storageBucket: "test-attendance-7ca52.firebasestorage.app",
  messagingSenderId: "224511815148",
  appId: "1:224511815148:web:66d54c315e1154b839e4c9"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceCol = collection(db, "attendance");

        // 현재 날짜 표시
        const now = new Date();
        document.getElementById('current-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

        // 출석 기록 제출 함수
        window.submitAttendance = async (status) => {
            const nameInput = document.getElementById('studentName');
            const name = nameInput.value.trim();

            if (!name) {
                alert("학생 이름을 입력해주세요.");
                return;
            }

            try {
                await addDoc(attendanceCol, {
                    name: name,
                    status: status,
                    timestamp: serverTimestamp()
                });
                nameInput.value = ""; // 입력란 초기화
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("저장에 실패했습니다.");
            }
        };

        // 기록 삭제 함수
        window.deleteRecord = async (id) => {
            if(confirm("이 기록을 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "attendance", id));
            }
        }

        // 실시간 데이터 감시 (Real-time update)
        const q = query(attendanceCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listContainer = document.getElementById('attendanceList');
            const countBadge = document.getElementById('recordCount');
            listContainer.innerHTML = "";
            
            if (snapshot.empty) {
                listContainer.innerHTML = `<div class="text-center py-10 text-slate-400 bg-white rounded-2xl border border-dashed border-slate-200">기록이 없습니다.</div>`;
                countBadge.innerText = "0건";
                return;
            }

            countBadge.innerText = `${snapshot.size}건`;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString('ko-KR', {hour: '2-digit', minute:'2-digit'}) : '...';
                
                let statusColor = "";
                switch(data.status) {
                    case '출석': statusColor = "bg-emerald-100 text-emerald-700"; break;
                    case '결석': statusColor = "bg-rose-100 text-rose-700"; break;
                    case '지각': statusColor = "bg-amber-100 text-amber-700"; break;
                }

                const html = `
                    <div class="record-card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold">
                                ${data.name.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800">${data.name}</h3>
                                <p class="text-xs text-slate-400">${time}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">
                                ${data.status}
                            </span>
                            <button onclick="deleteRecord('${id}')" class="text-slate-300 hover:text-rose-500 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += html;
            });
        });
    </script>
</body>
</html>
